name: Validate Task Completion
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract linked issue
        id: get-issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const match = pr.body.match(/#(\d+)/);
            if (match) {
              return match[1];
            }
            return null;
            
      - name: Validate PR format
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';
            
            const hasChanges = body.includes('### What Changed');
            const hasTest = body.includes('### How to Test');
            const hasChecklist = body.includes('### Validation Checklist');
            
            if (!hasChanges || !hasTest || !hasChecklist) {
              core.setFailed('PR missing required sections');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                body: '❌ PR template incomplete. Please include all required sections.'
              });
            } else {
              core.info('✅ PR format valid');
            }
            
      - name: Check issue linked
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const match = pr.body.match(/Closes? #(\d+)/i);
            
            if (!match) {
              core.warning('No linked issue found. PR should close an issue with "Closes #XXX"');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                body: '⚠️ This PR does not link to a task issue. Please add "Closes #XXX" to the description.'
              });
            }
            
      - name: Run tests (if applicable)
        run: |
          if [ -f "package.json" ]; then
            npm install
            npm test
          elif [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
            # python -m pytest or similar
          else
            echo "No test framework detected"
          fi
        continue-on-error: true
