name: Sync with Base44 and External Systems
on:
  pull_request:
    types: [closed]
    branches: [main, develop]

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract metadata
        id: meta
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const issue_match = pr.body.match(/Closes? #(\d+)/i);
            const issue_number = issue_match ? issue_match[1] : null;
            
            return {
              issue_number: issue_number,
              pr_number: pr.number,
              title: pr.title,
              merged_at: pr.merged_at,
              author: pr.user.login
            };
            
      - name: Notify Base44 (if webhook configured)
        if: secrets.BASE44_WEBHOOK != null
        run: |
          curl -X POST ${{ secrets.BASE44_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.BASE44_TOKEN }}" \
            -d '{
              "event": "task.completed",
              "issue": ${{ steps.meta.outputs.issue_number }},
              "pr": ${{ github.event.pull_request.number }},
              "merged_at": "${{ github.event.pull_request.merged_at }}"
            }' || echo "Base44 webhook not configured"
        continue-on-error: true
        
      - name: Update issue status
        uses: actions/github-script@v7
        with:
          script: |
            const issue_match = context.payload.pull_request.body.match(/Closes? #(\d+)/i);
            if (issue_match) {
              const issue_number = issue_match[1];
              
              github.rest.issues.addLabels({
                issue_number: issue_number,
                labels: ['status/done']
              });
              
              github.rest.issues.removeLabel({
                issue_number: issue_number,
                name: 'status/in-progress'
              });
              
              github.rest.issues.createComment({
                issue_number: issue_number,
                body: '✅ Task completed and merged in PR #' + context.payload.pull_request.number
              });
            }
