name: Route Task Spec
on:
  issues:
    types: [opened, labeled]

jobs:
  route:
    runs-on: ubuntu-latest
    steps:
      - name: Check if task spec
        if: contains(github.event.issue.labels.*.name, 'orchestration/task-spec')
        run: |
          echo "Task spec detected, routing to Cursor"
          
      - name: Auto-assign to Cursor
        if: contains(github.event.issue.labels.*.name, 'status/todo')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              labels: ['assigned/cursor', 'status/todo']
            })
            
      - name: Create feature branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNum = context.issue.number;
            const title = context.payload.issue.title
              .toLowerCase()
              .replace(/\[task\]\s*/i, '')
              .replace(/[^a-z0-9]/g, '-')
              .replace(/-+/g, '-')
              .substring(0, 50);
            const branchName = `feature/task-${issueNum}-${title}`;
            
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/heads/${branchName}`,
                sha: context.payload.repository.default_branch
              });
              console.log(`Created branch: ${branchName}`);
            } catch (error) {
              console.log(`Branch might already exist: ${error.message}`);
            }
            
      - name: Notify in comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              body: '✅ Task spec routed to Cursor. Branch created: `feature/task-' + context.issue.number + '-*`\n\nCursor: Please implement this task and open a PR when ready.'
            })
